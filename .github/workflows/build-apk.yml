name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # FIX 1: Upgraded Java version to 17 to fix the Gradle 9.6.0 error
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # FIX 2: Added execution permissions for your project's local Gradle tool
    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x ./gradlew
      working-directory: test_app

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: test_app

    - name: Build Release APK
      run: ./gradlew assembleRelease
      working-directory: test_app

    # FIX 3: Corrected the download paths to include the "/app/" subfolder standard in Android projects
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: test_app/app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: test_app/app/build/outputs/apk/release/
