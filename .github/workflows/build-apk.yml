name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # BYPASS GRADLEW: Using global gradle and forcing it to look inside test_app
    - name: Build Debug APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME_17_X64/bin:$PATH
        gradle assembleDebug
      working-directory: test_app

    - name: Build Release APK
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME_17_X64/bin:$PATH
        gradle assembleRelease
      working-directory: test_app

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: |
          test_app/app/build/outputs/apk/debug/
          test_app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: |
          test_app/app/build/outputs/apk/release/
          test_app/build/outputs/apk/release/
