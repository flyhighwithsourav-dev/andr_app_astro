name: Fresh APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Native Gradle
      uses: gradle/actions/setup-gradle@v4

    # DIAGNOSTIC STEP: Prints every file and folder in your repository
    - name: List Repository Structure
      run: |
        echo "=== Current Directory ==="
        pwd
        echo "=== Root Folder Contents ==="
        ls -la
        echo "=== test_app Folder Contents ==="
        ls -la test_app || echo "test_app folder not found"
      working-directory: ${{ github.workspace }}

    - name: Compile Debug APK
      run: gradle assembleDebug
      working-directory: test_app
