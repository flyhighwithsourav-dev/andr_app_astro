name: Fresh APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Native Gradle
      uses: gradle/actions/setup-gradle@v4

    # FIX: Creates a root-level override mapping to supply the missing Android Tools dependency
    - name: Inject Android Build Tools Core Dependencies
      run: |
        cat << 'EOF' > init.gradle
        allprojects {
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                }
                dependencies {
                    classpath 'com.android.tools.build:gradle:8.2.2'
                }
            }
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
      working-directory: test_app

    # Binds our newly injected dependencies directly into the compiler run
    - name: Compile Debug APK
      run: gradle assembleDebug --init-script init.gradle
      working-directory: test_app

    - name: Compile Release APK
      run: gradle assembleRelease --init-script init.gradle
      working-directory: test_app

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: |
          test_app/app/build/outputs/apk/debug/
          test_app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: |
          test_app/app/build/outputs/apk/release/
          test_app/build/outputs/apk/release/
