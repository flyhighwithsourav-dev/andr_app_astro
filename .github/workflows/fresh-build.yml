name: Fresh APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Native Gradle
      uses: gradle/actions/setup-gradle@v4

    # FIX 1: Deletes line 1 containing 'com.android.application' from the root build file
    - name: Strip Invalid Root Plugins
      run: |
        if [ -f build.gradle ]; then
          sed -i '/com.android.application/d' build.gradle
          sed -i '/plugins/d' build.gradle
        fi
      working-directory: test_app

    # FIX 2: Manually injects the correct Android plugin configurations into the settings layer
    - name: Inject Global Plugin Repositories
      run: |
        cat << 'EOF' > settings.gradle.new
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
            plugins {
                id 'com.android.application' version '8.2.2'
                id 'com.android.library' version '8.2.2'
                id 'org.jetbrains.kotlin.android' version '1.9.22'
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        if [ -f settings.gradle ]; then
            cat settings.gradle >> settings.gradle.new
        fi
        mv settings.gradle.new settings.gradle
      working-directory: test_app

    # FIX 3: TARGETED MODULE COMPILATION (Compiles the inner app folder directly)
    - name: Compile Debug APK
      run: gradle :app:assembleDebug
      working-directory: test_app

    - name: Compile Release APK
      run: gradle :app:assembleRelease
      working-directory: test_app

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: |
          test_app/app/build/outputs/apk/debug/
          test_app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: |
          test_app/app/build/outputs/apk/release/
          test_app/build/outputs/apk/release/
