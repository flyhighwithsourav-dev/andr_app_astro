name: Fresh APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Native Gradle
      uses: gradle/actions/setup-gradle@v4

    # FIX: Explicitly verifies or forces missing project directories to exist before Gradle runs
    - name: Ensure Module Directories Exist
      run: |
        mkdir -p test_app/app
      working-directory: ${{ github.workspace }}

    - name: Compile Debug APK
      run: gradle assembleDebug
      working-directory: test_app

    - name: Compile Release APK
      run: gradle assembleRelease
      working-directory: test_app

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: |
          test_app/app/build/outputs/apk/debug/
          test_app/build/outputs/apk/debug/

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: |
          test_app/app/build/outputs/apk/release/
          test_app/build/outputs/apk/release/
